<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>내 밴드 아카이브</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#37c272;--green-dark:#1a9e52;--green-light:#e8faf0;
  --bg:#f5f5f5;--bg-card:#ffffff;--border:#e0e0e0;
  --text:#1a1a1a;--text-sub:#666;--text-hint:#999;
  --danger:#e53935;--success:#1a9e52;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
.page{display:none;min-height:100vh}
.page.active{display:block}

/* ────── 로그인 ────── */
#loginPage.active{display:flex;align-items:center;justify-content:center;padding:2rem}
.login-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,0.07)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.logo-dot{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:18px;height:18px}
.logo-text{font-size:18px;font-weight:600}
.lf label{display:block;font-size:12px;color:var(--text-sub);margin-bottom:5px;font-weight:500}
.lf input{width:100%;height:42px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;transition:border-color .15s}
.lf input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(55,194,114,.12)}
.lf-err{font-size:12px;color:var(--danger);min-height:16px;margin-bottom:10px}
.btn-green{width:100%;height:42px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-green:hover{opacity:.88}

/* ────── 앱 레이아웃 ────── */
#appPage.active{display:flex;flex-direction:column}
.appbar{background:var(--green);padding:0 1.25rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.appbar-title{color:#fff;font-size:16px;font-weight:600}
.appbar-version{color:rgba(255,255,255,.6);font-size:11px;margin-left:8px;font-weight:400}
.appbar-btns{display:flex;gap:8px}
.appbar-btn{background:rgba(255,255,255,.22);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;padding:6px 12px;cursor:pointer;transition:background .15s}
.appbar-btn:hover{background:rgba(255,255,255,.32)}
.app-body{display:flex;flex:1;gap:0}
.feed-col{flex:1;padding:1.25rem;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:calc(100vh - 52px)}
.side-col{width:280px;flex-shrink:0;background:var(--bg-card);border-left:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 52px)}

/* ────── 글쓰기 박스 ────── */
.compose-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s}
.compose-box:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.compose-placeholder{font-size:14px;color:var(--text-hint);flex:1}

/* ────── 모달 ────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:560px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-hint);line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-author-row{display:flex;align-items:center;gap:10px;padding:14px 18px 0}
.modal-author-name{font-size:14px;font-weight:600}

/* ────── 블록 에디터 ────── */
.block-editor{padding:10px 18px}
.editor-block{position:relative;margin-bottom:4px}
.text-block textarea{
  width:100%;min-height:80px;border:none;outline:none;resize:none;
  font-size:15px;line-height:1.7;color:var(--text);font-family:inherit;
  background:transparent;padding:6px 0;
}
.text-block textarea::placeholder{color:var(--text-hint)}
.img-block{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin:8px 0}
.img-block img{width:100%;max-height:340px;object-fit:cover;display:block}
.img-block .caption-wrap{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fafafa;border-top:1px solid var(--border)}
.img-block .caption-input{flex:1;border:none;outline:none;font-size:13px;color:var(--text-sub);background:transparent;font-family:inherit}
.img-block .caption-input::placeholder{color:var(--text-hint)}
.block-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:18px;line-height:1;padding:2px 4px;flex-shrink:0}
.block-del:hover{color:var(--danger)}

/* 사진 추가 버튼 */
.add-img-row{padding:6px 18px 14px;display:flex;gap:8px}
.btn-add-img{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text-sub);transition:background .15s}
.btn-add-img:hover{background:#f5f5f5}
.modal-footer{display:flex;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border)}
.btn-submit{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-submit:hover{opacity:.88}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* ────── 피드 카드 ────── */
.post-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .15s}
.post-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.post-header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.post-header-info{flex:1}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--green-dark);flex-shrink:0}
.post-author{font-size:14px;font-weight:600}
.post-date{font-size:12px;color:var(--text-hint);margin-top:2px}

/* ────── 블록 렌더링 ────── */
.post-blocks{padding:0 16px 12px}
.block-text{font-size:14px;line-height:1.7;white-space:pre-wrap;color:var(--text);margin-bottom:8px}
.block-img-wrap{margin:8px 0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.block-img-wrap img{width:100%;max-height:360px;object-fit:cover;display:block}
.block-caption{font-size:12px;color:var(--text-sub);padding:7px 12px;background:#fafafa;border-top:1px solid var(--border)}

/* 구버전 호환 */
.post-body{padding:0 16px 12px;font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.post-imgs{display:grid;gap:2px}
.post-imgs.one img{width:100%;max-height:320px;object-fit:cover;display:block}
.post-imgs.two{grid-template-columns:1fr 1fr}
.post-imgs.two img{width:100%;height:160px;object-fit:cover;display:block}
.post-imgs.three{grid-template-columns:1fr 1fr}
.post-imgs.three .img-wrap:first-child{grid-column:1/-1}
.post-imgs.three .img-wrap:first-child img{height:200px;width:100%;object-fit:cover;display:block}
.post-imgs.three .img-wrap:not(:first-child) img{width:100%;height:150px;object-fit:cover;display:block}

.post-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.heart{width:17px;height:17px;fill:none;stroke:#bbb;stroke-width:1.5;cursor:pointer;transition:stroke .15s}
.heart:hover{stroke:#ff4d6d}
.heart.liked{fill:#ff4d6d;stroke:#ff4d6d}
.like-count{font-size:12px;color:var(--text-hint)}

/* ────── 더보기 메뉴 ────── */
.more-btn{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--text-hint);font-size:18px;line-height:1;border-radius:6px;transition:background .15s}
.more-btn:hover{background:#f0f0f0;color:var(--text)}
.more-menu-wrap{position:relative}
.more-menu{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,0.12);min-width:110px;z-index:200}
.more-menu.open{display:block}
.more-menu button{display:block;width:100%;text-align:left;padding:10px 16px;background:none;border:none;font-size:13px;cursor:pointer;color:var(--text);transition:background .15s}
.more-menu button:hover{background:#f5f5f5}
.more-menu button.danger{color:var(--danger)}

/* ────── 사이드 ────── */
.side-section{padding:1.1rem;border-bottom:1px solid var(--border)}
.side-title{font-size:13px;font-weight:600;margin-bottom:10px}
.side-hint{font-size:11px;color:var(--text-hint);line-height:1.65;margin-bottom:8px}
.inp{width:100%;height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:12px;outline:none;font-family:monospace;transition:border-color .15s}
.inp:focus{border-color:var(--green)}
textarea.inp{height:72px;resize:none;padding:7px 10px;line-height:1.5;font-family:inherit}
.btn-s{height:32px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:12px;cursor:pointer;transition:background .15s;width:100%;margin-top:6px}
.btn-s:hover{background:#f5f5f5}
.btn-s.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn-s.primary:hover{opacity:.88}
.btn-s.danger{color:var(--danger)}
.side-status{font-size:11px;margin-top:7px;min-height:14px;color:var(--text-sub);line-height:1.5}
.side-status.ok{color:var(--success)}
.side-status.err{color:var(--danger)}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
.stat-box{background:#f7f7f7;border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text-hint);margin-top:2px}

.empty-feed{text-align:center;padding:4rem 1rem;color:var(--text-hint);font-size:14px}
.empty-feed .icon{width:52px;height:52px;border-radius:50%;background:#efefef;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}

@media(max-width:600px){
  .side-col{display:none}
  .side-col.open{display:block;position:fixed;right:0;top:52px;bottom:0;width:100%;max-width:320px;z-index:200;overflow-y:auto;box-shadow:-4px 0 20px rgba(0,0,0,0.1)}
}
</style>
</head>
<body>

<!-- ════════ 로그인 ════════ -->
<div id="loginPage" class="page active">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-dot"><svg viewBox="0 0 18 18" fill="none"><path d="M9 2L10.8 6.5H15.5L11.6 9.3L13.1 14L9 11.2L4.9 14L6.4 9.3L2.5 6.5H7.2L9 2Z" fill="white"/></svg></div>
      <span class="logo-text">내 밴드 아카이브</span>
    </div>
    <form class="lf" id="loginForm" onsubmit="return false">
      <label>아이디</label>
      <input type="text" id="uid" placeholder="아이디" autocomplete="username"/>
      <label>비밀번호</label>
      <input type="text" id="upw" placeholder="비밀번호" autocomplete="off"/>
      <div class="lf-err" id="lerr"></div>
      <button type="submit" class="btn-green" id="loginBtn">로그인</button>
    </form>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:#bbb">v1.3.0</div>
  </div>
</div>

<!-- ════════ 글쓰기/수정 모달 ════════ -->
<div class="modal-overlay" id="writeModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">글 쓰기</span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-author-row">
      <div class="avatar" id="modalAvatar">?</div>
      <span class="modal-author-name" id="modalAuthorName"></span>
    </div>
    <div class="block-editor" id="blockEditor"></div>
    <div class="add-img-row">
      <button class="btn-add-img" id="addImgBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        사진 추가
      </button>
      <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none"/>
    </div>
    <div class="modal-footer">
      <button class="btn-submit" id="submitPost">등록</button>
    </div>
  </div>
</div>

<!-- ════════ 앱 ════════ -->
<div id="appPage" class="page">
  <div class="appbar">
    <span class="appbar-title">내 밴드 아카이브<span class="appbar-version">v1.3.0</span></span>
    <div class="appbar-btns">
      <button class="appbar-btn" id="toggleSide">글 가져오기</button>
      <button class="appbar-btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="app-body">
    <div class="feed-col" id="feed"></div>
    <div class="side-col" id="sideCol">
      <div class="side-section">
        <div class="side-title">현황</div>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num" id="statPosts">0</div><div class="stat-lbl">글</div></div>
          <div class="stat-box"><div class="stat-num" id="statImgs">0</div><div class="stat-lbl">이미지</div></div>
        </div>
      </div>
      <div class="side-section">
        <div class="side-title">밴드 API 연동</div>
        <div class="side-hint">밴드 개발자센터(<a href="https://developers.band.us" target="_blank" style="color:var(--green)">developers.band.us</a>)에서 Access Token과 Band Key를 발급받아 입력하세요.</div>
        <input class="inp" id="tokenInp" placeholder="access_token" style="margin-bottom:5px"/>
        <input class="inp" id="bandKeyInp" placeholder="band_key"/>
        <button class="btn-s primary" id="fetchApiBtn">API로 글 가져오기</button>
        <div class="side-status" id="apiStatus"></div>
      </div>
      <div class="side-section">
        <div class="side-title">JSON으로 불러오기</div>
        <div class="side-hint">백업해둔 JSON을 붙여넣거나 파일을 업로드하세요.</div>
        <textarea class="inp" id="jsonPaste" placeholder='{"posts":[...]} 또는 배열 형식'></textarea>
        <button class="btn-s" id="loadJsonBtn">JSON 불러오기</button>
        <input type="file" id="jsonFile" accept=".json" style="display:none"/>
        <button class="btn-s" id="fileBtn">파일 업로드</button>
        <div class="side-status" id="jsonStatus"></div>
      </div>
      <div class="side-section">
        <div class="side-title">데이터 관리</div>
        <button class="btn-s" id="exportBtn">JSON 내보내기 (백업)</button>
        <button class="btn-s danger" id="clearBtn">전체 초기화</button>
      </div>
    </div>
  </div>
</div>

<script>
const USERS = [
  { id: "관리자", pw: "9999" },
  { id: "김창민", pw: "1234" },
  { id: "안혜지", pw: "1234" },
];
const API = 'https://band-archive-api.cm99i.workers.dev';

let posts = [];
let currentUser = "";
let editingKey = null;
let editorBlocks = [];

function $(id){ return document.getElementById(id) }
function show(id){ document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); $(id).classList.add("active") }
function setStatus(el,msg,type){ el.className="side-status "+(type||""); el.textContent=msg }
function initials(name){ return (name||"?").charAt(0) }
function fmtDate(ts){
  if(!ts) return "";
  const d = typeof ts==="number" ? new Date(ts*1000) : new Date(ts);
  if(isNaN(d)) return ts;
  return d.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function normalizePosts(data){
  if(Array.isArray(data)) return data;
  if(data.posts) return data.posts;
  if(data.result_data?.items) return data.result_data.items;
  if(data.items) return data.items;
  return [];
}
function mergePosts(newPosts){
  const keys=new Set(posts.map(p=>p.id||p.post_key||p.content));
  let added=0;
  newPosts.forEach(p=>{ const k=p.id||p.post_key||p.content; if(!keys.has(k)){posts.push(p);added++;} });
  return added;
}

// ── Worker API ──
async function fetchPosts(){
  try{
    const res=await fetch(`${API}/api/posts`);
    posts=await res.json();
    renderPosts();
  }catch(e){ console.error("글 불러오기 실패:",e); }
}

// ── 렌더링 ──
function renderBlocksHtml(p){
  if(p.blocks && p.blocks.length){
    return '<div class="post-blocks">'+p.blocks.map(b=>{
      if(b.type==="text") return b.content?`<div class="block-text">${b.content}`+"</div>":"";
      if(b.type==="image") return `<div class="block-img-wrap"><img src="${b.url}" onerror="this.parentElement.style.display='none'" loading="lazy"/>${b.caption?`<div class="block-caption">${b.caption}`+"</div>":""}</div>`;
      return "";
    }).join("")+"</div>";
  }
  const content=p.content||"";
  const imgs=p.photos||p.images||[];
  let imgHtml="";
  if(imgs.length===1) imgHtml=`<div class="post-imgs one"><div class="img-wrap"><img src="${imgs[0].url||imgs[0]}" onerror="this.parentElement.style.display='none'" loading="lazy"/></div></div>`;
  else if(imgs.length===2) imgHtml=`<div class="post-imgs two">${imgs.map(im=>`<div class="img-wrap"><img src="${im.url||im}" onerror="this.parentElement.style.display='none'" loading="lazy"/></div>`).join("")}</div>`;
  else if(imgs.length>=3) imgHtml=`<div class="post-imgs three">${imgs.slice(0,3).map(im=>`<div class="img-wrap"><img src="${im.url||im}" onerror="this.parentElement.style.display='none'" loading="lazy"/></div>`).join("")}</div>`;
  return (content?`<div class="post-body">${content}</div>`:"") + imgHtml;
}
function countImgs(p){
  if(p.blocks) return p.blocks.filter(b=>b.type==="image").length;
  return (p.photos||p.images||[]).length;
}

function renderPosts(){
  const feed=$("feed");
  const composeHtml=`<div class="compose-box" id="composeBox"><div class="avatar">${initials(currentUser)}</div><span class="compose-placeholder">밴드에 글을 써보세요.</span></div>`;

  if(!posts.length){
    feed.innerHTML=composeHtml+`<div class="empty-feed"><div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="3" rx="1.5" fill="#ccc"/><rect x="3" y="11" width="13" height="3" rx="1.5" fill="#ccc"/><rect x="3" y="17" width="15" height="3" rx="1.5" fill="#ccc"/></svg></div><div>첫 번째 글을 작성해보세요!</div></div>`;
    $("statPosts").textContent="0"; $("statImgs").textContent="0";
    $("composeBox").onclick=openWriteModal; return;
  }

  let imgCount=0;
  const sorted=[...posts].sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  const cardsHtml=sorted.map(p=>{
    const key=p.id||"";
    const author=p.author?.name||p.author||"알 수 없음";
    const isMine=p.author===currentUser;
    imgCount+=countImgs(p);
    const moreMenu=isMine?`<div class="more-menu-wrap"><button class="more-btn" onclick="toggleMenu(event,'menu-${key}')">⋯</button><div class="more-menu" id="menu-${key}"><button onclick="editPost('${key}')">수정</button><button class="danger" onclick="deletePost('${key}')">삭제</button></div></div>`:"";
    return `<div class="post-card" data-key="${key}"><div class="post-header"><div class="avatar">${initials(author)}</div><div class="post-header-info"><div class="post-author">${author}</div><div class="post-date">${fmtDate(p.created_at)}</div></div>${moreMenu}</div>${renderBlocksHtml(p)}<div class="post-footer"><svg class="heart" viewBox="0 0 16 16"><path d="M8 13.7S1.5 9.8 1.5 5.5A3.5 3.5 0 018 3.1 3.5 3.5 0 0114.5 5.5C14.5 9.8 8 13.7 8 13.7z"/></svg><span class="like-count">${p.like_count||0}</span></div></div>`;
  }).join("");

  feed.innerHTML=composeHtml+cardsHtml;
  $("composeBox").onclick=openWriteModal;
  $("statPosts").textContent=posts.length;
  $("statImgs").textContent=imgCount;
}

// ── 더보기 메뉴 ──
function toggleMenu(e,id){ e.stopPropagation(); document.querySelectorAll(".more-menu.open").forEach(m=>{if(m.id!==id)m.classList.remove("open")}); document.getElementById(id).classList.toggle("open") }
document.addEventListener("click",()=>document.querySelectorAll(".more-menu.open").forEach(m=>m.classList.remove("open")));

// ── 블록 에디터 ──
function renderEditor(){
  const editor=$("blockEditor");
  editor.innerHTML="";
  editorBlocks.forEach((b,i)=>{
    const div=document.createElement("div");
    div.className="editor-block "+(b.type==="text"?"text-block":"img-block");
    if(b.type==="text"){
      div.innerHTML=`<textarea placeholder="${i===0?"밴드에 글을 써보세요.":"내용을 이어서 써보세요."}" rows="3">${b.content}</textarea>`;
      const ta=div.querySelector("textarea");
      ta.oninput=()=>{ editorBlocks[i].content=ta.value; ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; };
      ta.style.height="auto"; ta.style.height=(ta.scrollHeight||80)+"px";
    } else {
      div.innerHTML=`<img src="${b.url}" loading="lazy"/><div class="caption-wrap"><input class="caption-input" type="text" placeholder="사진 설명을 입력하세요 (선택)" value="${b.caption||''}"/><button class="block-del" title="삭제">×</button></div>`;
      div.querySelector(".caption-input").oninput=e=>{ editorBlocks[i].caption=e.target.value };
      div.querySelector(".block-del").onclick=()=>{ editorBlocks.splice(i,1); renderEditor() };
    }
    editor.appendChild(div);
  });
}

function openWriteModal(){
  editingKey=null;
  editorBlocks=[{type:"text",content:""}];
  $("modalTitle").textContent="글 쓰기";
  $("submitPost").textContent="등록";
  $("modalAvatar").textContent=initials(currentUser);
  $("modalAuthorName").textContent=currentUser;
  renderEditor();
  $("writeModal").classList.add("open");
  setTimeout(()=>$("blockEditor").querySelector("textarea")?.focus(),100);
}

function editPost(key){
  const p=posts.find(x=>x.id===key);
  if(!p) return;
  editingKey=key;
  if(p.blocks && p.blocks.length){
    editorBlocks=p.blocks.map(b=>({...b}));
  } else {
    editorBlocks=[{type:"text",content:p.content||""}];
    (p.photos||p.images||[]).forEach(im=>editorBlocks.push({type:"image",url:im.url||im,caption:im.caption||""}));
  }
  $("modalTitle").textContent="글 수정";
  $("submitPost").textContent="수정";
  $("modalAvatar").textContent=initials(currentUser);
  $("modalAuthorName").textContent=currentUser;
  renderEditor();
  $("writeModal").classList.add("open");
}

async function deletePost(key){
  if(!confirm("이 글을 삭제할까요?")) return;
  try{
    await fetch(`${API}/api/posts/${key}`,{method:"DELETE"});
    posts=posts.filter(p=>p.id!==key);
    renderPosts();
  }catch(e){ alert("삭제 실패: "+e.message); }
}

$("modalClose").onclick=()=>$("writeModal").classList.remove("open");
$("writeModal").onclick=e=>{ if(e.target===$("writeModal")) $("writeModal").classList.remove("open") };

// 사진 추가 (R2 업로드)
$("addImgBtn").onclick=()=>$("imgFileInput").click();
$("imgFileInput").onchange=async function(e){
  const files=Array.from(e.target.files);
  this.value="";
  $("addImgBtn").disabled=true;
  $("addImgBtn").textContent="업로드 중...";
  for(const file of files){
    const fd=new FormData();
    fd.append("file",file);
    try{
      const res=await fetch(`${API}/api/upload`,{method:"POST",body:fd});
      const data=await res.json();
      if(data.error) throw new Error(data.error);
      editorBlocks.push({type:"image",url:API+data.url,caption:""});
      editorBlocks.push({type:"text",content:""});
      renderEditor();
    }catch(err){ alert("이미지 업로드 실패: "+err.message); }
  }
  $("addImgBtn").disabled=false;
  $("addImgBtn").innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> 사진 추가`;
};

$("submitPost").onclick=async function(){
  const hasContent=editorBlocks.some(b=>b.type==="image"||(b.type==="text"&&b.content.trim()));
  if(!hasContent){ alert("내용을 입력해주세요."); return; }
  const finalBlocks=editorBlocks.filter(b=>b.type==="image"||(b.type==="text"&&b.content.trim()));
  $("submitPost").disabled=true;
  try{
    if(editingKey){
      await fetch(`${API}/api/posts/${editingKey}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({blocks:finalBlocks})});
      const p=posts.find(x=>x.id===editingKey);
      if(p) p.blocks=finalBlocks;
    } else {
      const res=await fetch(`${API}/api/posts`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({author:currentUser,blocks:finalBlocks})});
      const data=await res.json();
      posts.unshift({id:data.id,author:currentUser,blocks:finalBlocks,created_at:Math.floor(Date.now()/1000),like_count:0});
    }
    renderPosts();
    $("writeModal").classList.remove("open");
  }catch(e){ alert("저장 실패: "+e.message); }
  finally{ $("submitPost").disabled=false; }
};

// ── 로그인 ──
function doLogin(e){
  if(e) e.preventDefault();
  const id=$("uid").value.trim(), pw=$("upw").value.trim();
  if(!id||!pw){ $("lerr").textContent="아이디와 비밀번호를 입력해주세요."; return; }
  if(USERS.some(u=>u.id===id&&u.pw===pw)){
    currentUser=id;
    localStorage.setItem("saved_id",id); localStorage.setItem("saved_pw",pw);
    show("appPage"); renderPosts();
    fetchPosts();
  } else { $("lerr").textContent="아이디 또는 비밀번호가 올바르지 않습니다."; }
}
$("loginForm").onsubmit=doLogin;
$("loginBtn").onclick=doLogin;

// 새로고침 시 자동 로그인
const savedId=localStorage.getItem("saved_id"), savedPw=localStorage.getItem("saved_pw");
if(savedId&&savedPw&&USERS.some(u=>u.id===savedId&&u.pw===savedPw)){
  currentUser=savedId;
  show("appPage"); renderPosts();
  fetchPosts();
} else if(savedId){ $("uid").value=savedId; }

$("logoutBtn").onclick=function(){ currentUser=""; posts=[]; localStorage.removeItem("saved_id"); localStorage.removeItem("saved_pw"); $("uid").value=""; $("upw").value=""; $("lerr").textContent=""; show("loginPage") };
$("toggleSide").onclick=()=>$("sideCol").classList.toggle("open");

// ── 밴드 API 연동 ──
$("fetchApiBtn").onclick=async function(){
  const token=$("tokenInp").value.trim(), bandKey=$("bandKeyInp").value.trim(), st=$("apiStatus");
  if(!token||!bandKey){ setStatus(st,"토큰과 밴드 키를 모두 입력해주세요.","err"); return; }
  setStatus(st,"불러오는 중...","");
  try{
    const res=await fetch(`https://openapi.band.us/v2/band/posts?access_token=${encodeURIComponent(token)}&band_key=${encodeURIComponent(bandKey)}&locale=ko_KR&page_size=20`);
    const data=await res.json();
    if(data.result_code!==1) throw new Error(data.result_data?.message||"API 오류");
    const added=mergePosts(normalizePosts(data));
    setStatus(st,`✓ ${added}개 글 추가됨 (총 ${posts.length}개)`,"ok"); renderPosts();
  }catch(e){ setStatus(st,"오류: "+e.message+(e.message.includes("fetch")?"\n(CORS 제한)":""),"err"); }
};

// ── JSON ──
$("loadJsonBtn").onclick=function(){
  const txt=$("jsonPaste").value.trim(), st=$("jsonStatus");
  if(!txt){ setStatus(st,"JSON을 붙여넣어 주세요.","err"); return; }
  try{
    const data=JSON.parse(txt), newPosts=normalizePosts(data);
    if(!newPosts.length) throw new Error("글 데이터를 찾을 수 없습니다.");
    const added=mergePosts(newPosts);
    setStatus(st,`✓ ${added}개 글 추가됨 (총 ${posts.length}개)`,"ok");
    $("jsonPaste").value=""; renderPosts();
  }catch(e){ setStatus(st,"파싱 오류: "+e.message,"err"); }
};
$("fileBtn").onclick=()=>$("jsonFile").click();
$("jsonFile").onchange=function(e){
  const file=e.target.files[0]; if(!file) return;
  const st=$("jsonStatus"), r=new FileReader();
  r.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result), newPosts=normalizePosts(data);
      if(!newPosts.length) throw new Error("글 데이터를 찾을 수 없습니다.");
      const added=mergePosts(newPosts);
      setStatus(st,`✓ ${added}개 글 추가됨 (총 ${posts.length}개)`,"ok"); renderPosts();
    }catch(e){ setStatus(st,"파싱 오류: "+e.message,"err"); }
  };
  r.readAsText(file);
};
$("exportBtn").onclick=function(){
  const blob=new Blob([JSON.stringify({exported_at:new Date().toISOString(),posts},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`band_archive_${Date.now()}.json`; a.click();
};
$("clearBtn").onclick=function(){
  if(!confirm("모든 글 데이터를 초기화할까요? (서버 데이터는 유지됩니다)")) return;
  posts=[]; renderPosts();
};
</script>
