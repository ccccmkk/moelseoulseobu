<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>STEP — 서울서부지청 소통 플랫폼</title>
<meta name="theme-color" content="#37c272"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="STEP"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#37c272;--green-dark:#1a9e52;--green-light:#e8faf0;
  --bg:#f5f5f5;--bg-card:#fff;--border:#e8e8e8;
  --text:#1a1a1a;--text-sub:#555;--text-hint:#aaa;
  --danger:#e53935;--radius:12px;--radius-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
/* iOS 입력창 자동확대 방지 */
input,select,textarea{font-size:16px !important}
/* iOS 모달 관성스크롤 */
.modal-body{-webkit-overflow-scrolling:touch}
.page{display:none;min-height:100vh}.page.active{display:block}

/* ── 로그인 ── */
#loginPage.active{display:flex;align-items:center;justify-content:center;padding:2rem}
.login-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.logo-dot{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-dot svg{width:18px;height:18px}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--text-hint);letter-spacing:.2px;margin-top:1px}
.lf label{display:block;font-size:12px;color:var(--text-sub);margin-bottom:5px;font-weight:500}
.lf input{width:100%;height:42px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:14px;outline:none;margin-bottom:12px;transition:border-color .15s}
.lf input:focus{border-color:var(--green)}
.lf-err{font-size:12px;color:var(--danger);min-height:16px;margin-bottom:10px}
.btn-green{width:100%;height:42px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-green:hover{opacity:.88}

/* ── 앱 레이아웃 ── */
#appPage.active{display:flex;flex-direction:column}
.appbar{background:var(--green);padding:0 1.25rem;padding-top:var(--safe-top);height:calc(52px + var(--safe-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.appbar-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px}
.appbar-version{color:rgba(255,255,255,.6);font-size:11px;margin-left:6px;font-weight:400}
.appbar-btns{display:flex;gap:6px;align-items:center}
.appbar-btn{background:rgba(255,255,255,.22);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;padding:6px 12px;cursor:pointer;transition:background .15s}
.appbar-btn:hover{background:rgba(255,255,255,.32)}
.mileage-chip{background:rgba(255,255,255,.22);color:#fff;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.mileage-chip:hover{background:rgba(255,255,255,.32)}

/* ── 탭 시스템 ── */
.tab-page{display:none;padding:14px 14px calc(80px + var(--safe-bottom));max-width:620px;margin:0 auto;width:100%}
.tab-page.active{display:block}
.tab-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.tab-title{font-size:15px;font-weight:700}

/* ── 하단 네비 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding-bottom:var(--safe-bottom);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:10px !important;font-family:inherit;transition:color .15s;padding:6px 0;min-height:58px}
.nav-btn.active{color:var(--green)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:stroke-width .15s}
.nav-btn.active svg{stroke-width:2.4}

/* ── FAB ── */
.fab{position:fixed;right:18px;bottom:calc(70px + var(--safe-bottom));width:52px;height:52px;background:var(--green);border:none;border-radius:50%;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(55,194,114,.45);display:none;align-items:center;justify-content:center;z-index:90;transition:transform .15s;line-height:1}
.fab.show{display:flex}.fab:hover{transform:scale(1.07)}

/* ── 포스트 카드 ── */
.post-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 8px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green-dark);flex-shrink:0;overflow:hidden;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%}
.avatar.clickable{cursor:pointer;transition:opacity .15s}
.avatar.clickable:hover{opacity:.8}
.post-author{font-size:14px;font-weight:600;cursor:pointer;transition:color .15s}
.post-author:hover{color:var(--green)}
.post-date{font-size:11px;color:var(--text-hint);margin-top:1px}
.post-header-info{flex:1}
.more-menu-wrap{position:relative}
.more-btn{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--text-hint);font-size:20px;line-height:1;border-radius:6px;transition:background .15s}
.more-btn:hover{background:#f0f0f0}
.more-menu{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:110px;z-index:200}
.more-menu.open{display:block}
.more-menu button{display:block;width:100%;text-align:left;padding:10px 16px;background:none;border:none;font-size:13px;cursor:pointer;color:var(--text);transition:background .15s;font-family:inherit}
.more-menu button:hover{background:#f5f5f5}
.more-menu button.danger{color:var(--danger)}
.post-img-wrap{cursor:zoom-in;position:relative}
.post-img-wrap img{width:100%;display:block;max-height:480px;object-fit:cover}
.post-img-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:3px 9px;border-radius:20px}
.post-img-grid{display:grid;gap:2px}
.post-img-grid.two{grid-template-columns:1fr 1fr}
.post-img-grid.two img,.post-img-grid.three img{width:100%;height:200px;object-fit:cover;cursor:zoom-in;display:block}
.post-img-grid.three{grid-template-columns:1fr 1fr}
.post-img-grid.three .img-main{grid-column:1/-1}
.post-img-grid.three .img-main img{height:260px}
.block-caption{font-size:12px;color:var(--text-sub);padding:6px 14px;background:#fafafa;border-top:1px solid var(--border)}
.block-text{font-size:14px;line-height:1.75;padding:8px 14px;white-space:pre-wrap;color:var(--text)}
.post-actions{padding:6px 10px 8px;display:flex;align-items:center;gap:12px}
.act-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--text-sub);padding:5px 4px;font-size:14px;font-family:inherit;transition:color .15s}
.act-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;transition:.2s}
.act-btn.liked{color:#ff4d6d}.act-btn.liked svg{fill:#ff4d6d;stroke:#ff4d6d}
.act-btn:hover{opacity:.75}
.post-keyword-tag{display:inline-block;font-size:11px;font-weight:600;color:var(--green-dark);background:var(--green-light);padding:2px 9px;border-radius:12px;margin:0 14px 6px}

/* ── 유저 필터 바 ── */
.user-filter-bar{background:var(--green-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.user-filter-name{font-size:14px;font-weight:600;color:var(--green-dark)}
.user-filter-close{background:none;border:none;color:var(--green-dark);font-size:20px;cursor:pointer;line-height:1}

/* ── 라이트박스 ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1000;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightboxImg{max-width:100%;max-height:100dvh;object-fit:contain}
.lb-close{position:fixed;top:14px;right:14px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1001}

/* ── 댓글 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-overlay.center{align-items:center;padding:1rem}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90dvh;display:flex;flex-direction:column;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.modal-overlay.center .modal{border-radius:var(--radius);max-height:85dvh}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-hint);padding:2px 6px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;flex:1}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.comments-list{padding:12px 16px}
.comment-item{display:flex;gap:10px;margin-bottom:14px}
.comment-body{flex:1}
.comment-author{font-size:13px;font-weight:600}
.comment-text{font-size:13px;color:var(--text);margin-top:2px;line-height:1.55;word-break:break-all}
.comment-meta{font-size:11px;color:var(--text-hint);margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.comment-del{background:none;border:none;color:var(--text-hint);font-size:11px;cursor:pointer;padding:0;font-family:inherit}
.comment-del:hover{color:var(--danger)}
.comment-like-btn{background:none;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--text-hint);padding:0;font-family:inherit;transition:color .15s}
.comment-like-btn.liked{color:#ff4d6d}
.comment-reply-btn{background:none;border:none;font-size:12px;cursor:pointer;color:var(--text-hint);padding:0;font-family:inherit;transition:color .15s}
.comment-reply-btn:hover,.comment-like-btn:hover{opacity:.8}
.comment-pin-badge{font-size:10px;background:#fff3cd;color:#856404;border-radius:10px;padding:1px 6px;font-weight:600}
.reply-list{margin-top:8px;padding-left:14px;border-left:2px solid var(--border)}
.reply-item{display:flex;gap:8px;margin-bottom:8px}
.reply-input-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.reply-input-row input{flex:1;border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;outline:none;font-family:inherit;background:#f5f5f5}
.reply-input-row input:focus{border-color:var(--green);background:#fff}
.reply-input-row button{background:none;border:none;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.comment-input-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.comment-input-row input{flex:1;border:none;outline:none;font-size:14px;background:transparent;font-family:inherit;padding:4px 0}
.comment-input-row button{background:none;border:none;color:var(--green);font-size:14px;font-weight:700;cursor:pointer;padding:4px 8px}
.comment-input-row button:disabled{opacity:.35;cursor:not-allowed}

/* ── 글쓰기 모달 ── */
.write-modal{border-radius:var(--radius);max-height:90dvh}
.modal-author-row{display:flex;align-items:center;gap:10px;padding:12px 16px 0}
.modal-author-name{font-size:14px;font-weight:600}
.block-editor{padding:8px 16px}
.editor-block{position:relative;margin-bottom:4px}
.text-block textarea{width:100%;min-height:80px;border:none;outline:none;resize:none;font-size:15px;line-height:1.7;color:var(--text);font-family:inherit;background:transparent;padding:6px 0}
.text-block textarea::placeholder{color:var(--text-hint)}
.img-block{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin:8px 0}
.img-block img{width:100%;max-height:300px;object-fit:cover;display:block}
.img-block .caption-wrap{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fafafa;border-top:1px solid var(--border)}
.img-block .caption-input{flex:1;border:none;outline:none;font-size:13px;color:var(--text-sub);background:transparent;font-family:inherit}
.img-block .caption-input::placeholder{color:var(--text-hint)}
.block-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:18px;line-height:1;padding:2px 4px;flex-shrink:0}
.block-del:hover{color:var(--danger)}
.add-img-row{padding:4px 16px 8px;display:flex;gap:8px}
.btn-add-img{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text-sub);transition:background .15s;font-family:inherit}
.btn-add-img:hover{background:#f5f5f5}
.keyword-selector-wrap{padding:8px 16px 12px;border-top:1px solid var(--border)}
.keyword-selector-label{font-size:11px;color:var(--text-hint);margin-bottom:7px}
.keyword-selector{display:flex;flex-wrap:wrap;gap:6px}
.kw-btn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.kw-btn.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600}
.btn-submit{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 24px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-submit:hover{opacity:.88}.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* ── 뉴스 탭 ── */
.news-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.news-gyeongjo-btn{display:flex;align-items:center;gap:4px;padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.news-gyeongjo-btn:hover{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.news-cat-tabs{display:flex;gap:8px;margin-bottom:14px}
.news-cat-btn{padding:7px 18px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500}
.news-cat-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.news-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.news-card-title a{font-size:14px;font-weight:600;line-height:1.5;color:var(--text);text-decoration:none;display:block;margin-bottom:6px}
.news-card-title a:hover{color:var(--green)}
.news-card-meta{font-size:12px;color:var(--text-hint);display:flex;gap:10px;align-items:center}
.news-source{font-weight:600;color:var(--text-sub)}
.news-summary-btn{background:none;border:none;font-size:12px;color:var(--green);cursor:pointer;padding:0;font-family:inherit;margin-top:7px;display:block}
.news-summary{font-size:13px;color:var(--text-sub);line-height:1.65;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none}
.news-summary.open{display:block}
.news-loading{text-align:center;padding:3rem 1rem;color:var(--text-hint);font-size:14px;line-height:1.9}
.news-refresh-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}

/* ── 채팅 ── */
.chat-msg{display:flex;gap:8px;align-items:flex-end}
.chat-msg.mine{flex-direction:row-reverse}
.chat-bubble{max-width:72%;background:#f0f0f0;border-radius:18px 18px 18px 4px;padding:9px 13px;font-size:14px;line-height:1.45;word-break:break-word}
.chat-msg.mine .chat-bubble{background:var(--green);color:#fff;border-radius:18px 18px 4px 18px}
.chat-meta{font-size:10px;color:var(--text-hint);margin-bottom:2px;flex-shrink:0}
.chat-msg.mine .chat-meta{text-align:right}
.chat-date-sep{text-align:center;font-size:11px;color:var(--text-hint);margin:4px 0}

/* ── 이벤트(경조사) 탭 ── */
.event-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start}
.event-icon{width:46px;height:46px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#f5f5f5}
.event-info{flex:1}
.event-type-badge{font-size:11px;font-weight:600;color:var(--green-dark);background:var(--green-light);padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.event-title{font-size:15px;font-weight:600;margin-bottom:4px}
.event-content{font-size:13px;color:var(--text-sub);line-height:1.6}
.event-meta{font-size:11px;color:var(--text-hint);margin-top:6px}
.event-del{background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:18px;padding:2px 6px;align-self:flex-start;line-height:1}
.event-del:hover{color:var(--danger)}

/* ── 검색 탭 ── */
.search-input-row{position:relative;margin-bottom:14px}
.search-input-row input{width:100%;height:42px;padding:0 14px 0 40px;border:1px solid var(--border);border-radius:24px;outline:none;font-size:14px;background:#fff;font-family:inherit;transition:border-color .15s}
.search-input-row input:focus{border-color:var(--green)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-hint);pointer-events:none}
.search-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── 서부 프로 탭 ── */
.vote-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.vote-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.vote-title{font-size:16px;font-weight:700}
.vote-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.vote-status.active{background:#fff0f3;color:#ff4d6d}
.vote-status.closed{background:#f5f5f5;color:var(--text-hint)}
.vote-desc{font-size:13px;color:var(--text-sub);margin-bottom:8px;line-height:1.65}
.vote-deadline{font-size:12px;color:var(--text-hint);margin-bottom:14px}
.vote-options{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.vote-option-btn{padding:7px 18px;border:2px solid var(--border);border-radius:24px;background:#fff;font-size:14px;cursor:pointer;transition:.15s;font-family:inherit}
.vote-option-btn:hover,.vote-option-btn.selected{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
.vote-results{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.vote-result-row{display:flex;align-items:center;gap:10px}
.vote-result-name{font-size:14px;font-weight:600;width:72px;flex-shrink:0}
.vote-bar-wrap{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.vote-bar{height:100%;background:var(--green);border-radius:4px;transition:width .6s}
.vote-count{font-size:13px;color:var(--text-sub);width:28px;text-align:right;flex-shrink:0}
.btn-vote{width:100%;height:42px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn-vote:disabled{opacity:.4;cursor:not-allowed}
.voted-msg{text-align:center;font-size:13px;color:var(--text-sub);padding:6px 0}
.vote-admin-btns{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.btn-sm{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.danger{color:var(--danger)}
.btn-sm.primary{background:var(--green);color:#fff;border-color:var(--green)}

/* ── 폼 공통 ── */
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text-sub);font-weight:500;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green)}
.form-row textarea{resize:none;min-height:80px;line-height:1.6}
.form-actions{display:flex;justify-content:flex-end;gap:8px;padding:14px 16px;border-top:1px solid var(--border)}

/* ── 어드민 ── */
.admin-section{padding:0 16px 14px}
.admin-tab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:0}
.admin-tab-btn{flex:1;padding:11px 8px;border:none;background:none;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text-hint);border-bottom:2px solid transparent;transition:.15s}
.admin-tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.admin-tab-pane{display:none;padding-top:12px}.admin-tab-pane.active{display:block}
.user-role-row{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.user-role-row:last-child{border-bottom:none}
.user-role-top{display:flex;align-items:center;justify-content:space-between}
.user-role-name{font-size:14px;font-weight:600}
.role-btns{display:flex;gap:6px}
.role-btn{padding:4px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;font-family:inherit;transition:.15s}
.role-btn.on{background:var(--green);color:#fff;border-color:var(--green)}
.user-stats{font-size:12px;color:var(--text-hint);display:flex;gap:12px}

/* ── 프로필 모달 ── */
.profile-modal-body{padding:20px}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
.profile-avatar-big{width:72px;height:72px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--green-dark);overflow:hidden;position:relative}
.profile-avatar-big img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.profile-name{font-size:17px;font-weight:700}
.profile-edit-btn{font-size:12px;color:var(--green);cursor:pointer;background:none;border:1px solid var(--green);border-radius:12px;padding:3px 10px;font-family:inherit}
.profile-mileage-box{background:var(--green-light);border-radius:var(--radius-sm);padding:14px;text-align:center;margin-bottom:16px}
.profile-mileage-label{font-size:12px;color:var(--text-sub)}
.profile-mileage-val{font-size:28px;font-weight:800;color:var(--green-dark);margin:4px 0}
.profile-posts-title{font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:10px}

/* ── 당겨서 새로고침 ── */
body{overscroll-behavior-y:contain}
#pullIndicator{position:fixed;top:calc(52px + var(--safe-top));left:0;right:0;height:48px;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:var(--green);font-size:13px;font-weight:600;transform:translateY(-52px);transition:transform .25s ease;z-index:80;box-shadow:0 3px 10px rgba(0,0,0,.09);pointer-events:none}
.pull-icon{font-size:18px;transition:transform .25s;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}.pull-icon.spinning{animation:spin .7s linear infinite;transition:none}

/* ── 로그인/회원가입 탭 ── */
.login-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.login-tab-btn{flex:1;padding:10px;border:none;background:none;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-hint);border-bottom:2px solid transparent;transition:.15s;font-family:inherit}
.login-tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}

/* ── 랭킹 탭 ── */
.rank-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.rank-num{font-size:16px;font-weight:800;min-width:28px;text-align:center;color:var(--text-hint)}
.rank-num.gold{color:#f7b731}.rank-num.silver{color:#9e9e9e}.rank-num.bronze{color:#cd7f32}
.rank-info{flex:1}
.rank-name{font-size:14px;font-weight:600}
.rank-sub{font-size:11px;color:var(--text-hint);margin-top:2px}
.rank-pts{font-size:16px;font-weight:700;color:var(--green-dark)}

/* ── 이벤트 탭 구분선 ── */
.section-divider{border-top:6px solid var(--bg);margin:20px -14px 16px}
.section-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* ── 공통 ── */
.empty-state{text-align:center;padding:4rem 1rem;color:var(--text-hint);font-size:14px}
.compose-box{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:12px;transition:box-shadow .15s}
.compose-box:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.compose-placeholder{font-size:14px;color:var(--text-hint);flex:1}
</style>
</head>
<body>

<!-- ════ 로그인 ════ -->
<div id="loginPage" class="page active">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-dot"><svg viewBox="0 0 18 18" fill="none"><path d="M9 2L10.8 6.5H15.5L11.6 9.3L13.1 14L9 11.2L4.9 14L6.4 9.3L2.5 6.5H7.2L9 2Z" fill="white"/></svg></div>
      <div>
        <div class="logo-text">STEP</div>
        <div class="logo-sub">Seobu Together Empathy Platform</div>
      </div>
    </div>
    <div class="login-tabs">
      <button class="login-tab-btn active" id="ltab-login" onclick="switchLoginTab('login')">로그인</button>
      <button class="login-tab-btn" id="ltab-register" onclick="switchLoginTab('register')">회원가입</button>
    </div>
    <!-- 로그인 폼 -->
    <form class="lf" id="loginForm" onsubmit="return false">
      <label>아이디</label>
      <input type="text" id="uid" placeholder="아이디" autocomplete="username"/>
      <label>비밀번호</label>
      <input type="password" id="upw" placeholder="비밀번호" autocomplete="current-password"/>
      <div class="lf-err" id="lerr"></div>
      <button type="submit" class="btn-green" id="loginBtn">로그인</button>
    </form>
    <!-- 회원가입 폼 -->
    <form class="lf" id="registerForm" onsubmit="return false" style="display:none">
      <label>사용할 아이디</label>
      <input type="text" id="reg-id" placeholder="아이디 (2자 이상)" autocomplete="username"/>
      <label>비밀번호</label>
      <input type="password" id="reg-pw" placeholder="비밀번호" autocomplete="new-password"/>
      <div class="lf-err" id="rerr"></div>
      <button type="submit" class="btn-green" id="registerBtn">가입 신청</button>
      <div style="font-size:11px;color:var(--text-hint);text-align:center;margin-top:10px;line-height:1.6">관리자 승인 후 로그인 가능합니다.</div>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:11px;color:#bbb;line-height:1.7">
      서울서부지청 구성원의 공감과 화합을 위해 구축된<br>우리만의 소통 플랫폼입니다.
    </div>
  </div>
</div>

<!-- ════ 당겨서 새로고침 인디케이터 ════ -->
<div id="pullIndicator"><span class="pull-icon" id="pullIcon">↓</span><span id="pullText">당겨서 새로고침</span></div>

<!-- ════ 앱 ════ -->
<div id="appPage" class="page">
  <div class="appbar">
    <span class="appbar-title">STEP<span class="appbar-version">서울서부지청</span></span>
    <div class="appbar-btns">
      <span class="mileage-chip" id="mileageChip" onclick="openProfileModal(currentUser)"><svg id="mileageStar" viewBox="0 0 24 24" fill="#fff" width="13" height="13" style="vertical-align:-1px;margin-right:2px"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span id="mileageNum">0</span>P</span>
      <button class="appbar-btn" id="chatBtn" onclick="openChat()" style="position:relative;padding:6px 10px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span id="chatBadge" style="display:none;position:absolute;top:2px;right:2px;background:#e53935;color:#fff;border-radius:50%;width:8px;height:8px;font-size:0"></span>
      </button>
      <button class="appbar-btn" id="adminBtn" style="display:none" onclick="openAdminModal()">관리</button>
      <button class="appbar-btn" id="logoutBtn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 피드 탭 -->
  <div id="tabFeed" class="tab-page active">
    <div id="userFilterBar" style="display:none" class="user-filter-bar">
      <span class="user-filter-name" id="userFilterName"></span>
      <button class="user-filter-close" onclick="clearUserFilter()">×</button>
    </div>
    <div id="feed"></div>
  </div>

  <!-- 뉴스 탭 -->
  <div id="tabNews" class="tab-page">
    <div class="news-header-row">
      <span class="tab-title">뉴스 스크랩</span>
    </div>
    <div class="news-cat-tabs">
      <button class="news-cat-btn active" id="newsCatLabor" onclick="switchNewsCategory('labor')">고용·노동</button>
      <button class="news-cat-btn" id="newsCatLocal" onclick="switchNewsCategory('local')">지역뉴스</button>
    </div>
    <div id="newsContainer"><div class="news-loading">탭을 열면 뉴스를 불러옵니다.</div></div>
  </div>

  <!-- 이벤트 탭 (경조사 + 서부프로 통합) -->
  <div id="tabEvents" class="tab-page">
    <div class="section-title-row">
      <span class="tab-title">경조사 소식</span>
      <button class="btn-sm primary" onclick="openEventModal()">+ 소식 추가</button>
    </div>
    <div id="eventsList"></div>
    <div class="section-divider"></div>
    <div class="section-title-row">
      <span class="tab-title">서부 프로</span>
      <div id="praiseAdminRow" style="display:none">
        <button class="btn-sm primary" onclick="openPraiseCreate()">+ 만들기</button>
      </div>
    </div>
    <div id="praiseList"></div>
  </div>

  <!-- 검색 탭 -->
  <div id="tabSearch" class="tab-page">
    <div class="search-input-row">
      <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg></span>
      <input type="text" id="searchInput" placeholder="글, 작성자, 키워드 검색..."/>
    </div>
    <div id="searchResults"><div class="empty-state">검색어를 입력하세요</div></div>
  </div>

  <!-- 랭킹 탭 -->
  <div id="tabRanking" class="tab-page">
    <div class="tab-title-row" style="margin-bottom:16px">
      <span class="tab-title">활동 랭킹</span>
    </div>
    <div id="rankingList"><div class="empty-state">불러오는 중...</div></div>
  </div>

  <!-- 하단 네비 -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="switchTab('feed')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      피드
    </button>
    <button class="nav-btn" id="nav-news" onclick="switchTab('news')">
      <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>
      뉴스
    </button>
    <button class="nav-btn" id="nav-events" onclick="switchTab('events')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      이벤트
    </button>
    <button class="nav-btn" id="nav-search" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
      검색
    </button>
    <button class="nav-btn" id="nav-ranking" onclick="switchTab('ranking')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      랭킹
    </button>
  </nav>
</div>

<!-- ════ FAB ════ -->
<button class="fab" id="fab" onclick="openWriteModal()">+</button>

<!-- ════ 글쓰기 모달 ════ -->
<div class="modal-overlay center" id="writeModal">
  <div class="modal write-modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">글 쓰기</span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-author-row">
        <div class="avatar" id="modalAvatar">?</div>
        <span class="modal-author-name" id="modalAuthorName"></span>
      </div>
      <div class="block-editor" id="blockEditor"></div>
      <div class="add-img-row">
        <button class="btn-add-img" id="addImgBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          사진 추가
        </button>
        <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none"/>
      </div>
      <div class="keyword-selector-wrap">
        <div class="keyword-selector-label">주제 태그 (선택)</div>
        <div class="keyword-selector" id="keywordSelector"></div>
      </div>
    </div>
    <div class="modal-footer" style="display:flex;justify-content:flex-end">
      <button class="btn-submit" id="submitPost">등록</button>
    </div>
  </div>
</div>

<!-- ════ 댓글 모달 ════ -->
<div class="modal-overlay" id="commentsModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">댓글</span>
      <button class="modal-close" onclick="$('commentsModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <div class="comments-list" id="commentsList"></div>
    </div>
    <div class="comment-input-row">
      <div class="avatar" id="cmtAvatar" style="width:28px;height:28px;font-size:11px;flex-shrink:0"></div>
      <input type="text" id="commentInput" placeholder="댓글 달기..."/>
      <button id="submitComment" disabled>게시</button>
    </div>
  </div>
</div>

<!-- ════ 라이트박스 ════ -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" onclick="event.stopPropagation()"/>
  <button class="lb-close" onclick="closeLightbox()">×</button>
</div>

<!-- ════ 경조사 작성 모달 ════ -->
<div class="modal-overlay center" id="eventModal">
  <div class="modal write-modal">
    <div class="modal-header">
      <span class="modal-title">경조사 소식 추가</span>
      <button class="modal-close" onclick="$('eventModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div class="form-row">
        <label>종류</label>
        <select id="evtType">
          <option value="결혼">결혼</option>
          <option value="출산">출산</option>
          <option value="생일">생일</option>
          <option value="상">상</option>
          <option value="승진">승진</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="evtTitle" placeholder="예) 홍길동 대리 결혼 소식"/>
      </div>
      <div class="form-row">
        <label>내용 (선택)</label>
        <textarea id="evtContent" placeholder="상세 내용을 입력하세요"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-sm" onclick="$('eventModal').classList.remove('open')">취소</button>
      <button class="btn-sm primary" onclick="submitEvent()">등록</button>
    </div>
  </div>
</div>

<!-- ════ 서부 프로 만들기 모달 ════ -->
<div class="modal-overlay center" id="praiseModal">
  <div class="modal write-modal">
    <div class="modal-header">
      <span class="modal-title">서부 프로 만들기</span>
      <button class="modal-close" onclick="$('praiseModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="praiseTitle" placeholder="예) 이달의 서부 프로"/>
      </div>
      <div class="form-row">
        <label>설명 (선택)</label>
        <textarea id="praiseDesc" placeholder="부서 추천을 받아 이달의 서부 프로를 선정합니다"></textarea>
      </div>
      <div class="form-row">
        <label>마감일 (선택)</label>
        <input type="datetime-local" id="praiseEnd"/>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-sm" onclick="$('praiseModal').classList.remove('open')">취소</button>
      <button class="btn-sm primary" onclick="submitPraiseSession()">만들기</button>
    </div>
  </div>
</div>

<!-- ════ 채팅 모달 ════ -->
<div class="modal-overlay" id="chatModal" style="align-items:flex-end">
  <div class="modal" style="border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:100%;max-height:85vh;display:flex;flex-direction:column;margin:0">
    <div class="modal-header" style="flex-shrink:0">
      <span class="modal-title">채팅</span>
      <button class="modal-close" onclick="closeChat()">×</button>
    </div>
    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;min-height:200px"></div>
    <div style="flex-shrink:0;padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;background:#fff">
      <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." style="flex:1;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:15px;font-family:inherit;outline:none"/>
      <button onclick="sendChat()" style="background:var(--green);color:#fff;border:none;border-radius:20px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">전송</button>
    </div>
  </div>
</div>

<!-- ════ 관리자 모달 ════ -->
<div class="modal-overlay center" id="adminModal">
  <div class="modal write-modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ 관리자 패널</span>
      <button class="modal-close" onclick="$('adminModal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body">
      <div class="admin-tab-row">
        <button class="admin-tab-btn active" id="adminTab-users" onclick="switchAdminTab('users')">사용자</button>
        <button class="admin-tab-btn" id="adminTab-mileage" onclick="switchAdminTab('mileage')">마일리지</button>
        <button class="admin-tab-btn" id="adminTab-online" onclick="switchAdminTab('online')">접속자</button>
        <button class="admin-tab-btn" id="adminTab-ai" onclick="switchAdminTab('ai')">AI 사용량</button>
      </div>
      <div class="admin-section">
        <div class="admin-tab-pane active" id="adminPane-users">
          <div id="userRoleList"></div>
        </div>
        <div class="admin-tab-pane" id="adminPane-mileage">
          <div id="mileageRankList"></div>
        </div>
        <div class="admin-tab-pane" id="adminPane-online">
          <div id="onlineUserList"></div>
        </div>
        <div class="admin-tab-pane" id="adminPane-ai">
          <div id="aiUsagePanel"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ════ 프로필 모달 ════ -->
<div class="modal-overlay center" id="profileModal">
  <div class="modal write-modal">
    <div class="modal-header">

<script>
const API = 'https://band-archive-api.cm99i.workers.dev';
const EVT_ICONS = { 결혼:'혼', 출산:'탄', 생일:'생', 상:'상', 승진:'진', 기타:'등' };
const EVT_COLORS = { 결혼:'#ff6b9d', 출산:'#4ecdc4', 생일:'#ffd93d', 상:'#666', 승진:'#37c272', 기타:'#a0aec0' };
const KEYWORDS = ['맛집','취미','여행','재테크','일상','기타'];

let posts=[], events=[], voteSessions=[];
let likedPosts=new Set();
let userRoles={};
let currentUser='', currentUserRole='user';
let editingKey=null, editorBlocks=[];
let commentingPostId=null;
let selectedNominee=null;
let filterUser=null;
let selectedKeyword=null;
let newsData={labor:null,local:null};
let currentNewsCategory='labor';
let newsShownCount={labor:10,local:10};
let activeUsers=[];
let chatPollTimer=null, chatLastTs=0, chatUnread=0;

// API-backed state (no localStorage)
let postKeywords={};    // { postId: keyword }
let userProfiles={};    // { userId: { avatarUrl } }
let currentCommentLikeMap={};  // { commentId: { count, liked } } for current modal
let currentCommentReplyMap={}; // { commentId: [replies] } for current modal

function $(id){ return document.getElementById(id) }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function initials(n){ return (n||'?').charAt(0) }

function relDate(ts){
  if(!ts) return '';
  const d=Math.floor(Date.now()/1000)-(typeof ts==='number'?ts:Math.floor(new Date(ts)/1000));
  if(d<60) return '방금 전';
  if(d<3600) return Math.floor(d/60)+'분 전';
  if(d<86400) return Math.floor(d/3600)+'시간 전';
  if(d<86400*7) return Math.floor(d/86400)+'일 전';
  const dt=new Date(typeof ts==='number'?ts*1000:ts);
  return dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}
function fmtEndDate(ts){
  if(!ts) return '';
  return new Date(ts*1000).toLocaleDateString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── 마일리지 (서버) ──
async function fetchAndUpdateMileage(){
  try{
    const r=await fetch(`${API}/api/mileage/${encodeURIComponent(currentUser)}`);
    const d=await r.json();
    const chip=$('mileageChip');
    if(chip){ $('mileageNum').textContent=(d.points||0); }
  }catch(e){}
}

// ── 프로필 (서버) ──
async function fetchProfiles(){
  try{
    const r=await fetch(`${API}/api/profiles`);
    const arr=await r.json();
    userProfiles={};
    arr.forEach(p=>{ if(p.avatar_url) userProfiles[p.user_id]={avatarUrl:p.avatar_url} });
  }catch(e){}
}

// ── 포스트 키워드 (서버) ──
async function fetchPostKeywords(){
  try{
    const r=await fetch(`${API}/api/post-keywords`);
    const arr=await r.json();
    postKeywords={};
    arr.forEach(k=>{ postKeywords[k.post_id]=k.keyword });
  }catch(e){}
}

// ── 아바타 HTML ──
function avHtml(user,size,extra){
  const w=size||36, fs=Math.floor(w*0.36);
  const url=userProfiles[user]?.avatarUrl;
  const img=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.style.display='none'"/>` :'';
  return `<div class="avatar${extra?' '+extra:''}" style="width:${w}px;height:${w}px;font-size:${fs}px">${img}${initials(user)}</div>`;
}

// ── 탭 전환 ──
const TAB_IDS={feed:'tabFeed',news:'tabNews',events:'tabEvents',search:'tabSearch',ranking:'tabRanking'};
function switchTab(tab){
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(TAB_IDS[tab]) $(TAB_IDS[tab])?.classList.add('active');
  $('nav-'+tab)?.classList.add('active');
  $('fab').className='fab'+(tab==='feed'?' show':'');
  if(tab==='search') setTimeout(()=>$('searchInput').focus(),100);
  if(tab==='events'){
    if(!eventsLoaded){ eventsLoaded=true; fetchEvents().then(renderEvents); } else renderEvents();
    if(!votesLoaded){ votesLoaded=true; fetchVotes().then(renderPraise); } else renderPraise();
  }
  if(tab==='news') initNewsTab();
  if(tab==='ranking') renderRanking();
  if(tab==='feed'){ fetchAndUpdateMileage(); }
}

// ── API ──
async function fetchPosts(){ try{ const r=await fetch(`${API}/api/posts`); posts=await r.json(); }catch(e){ console.error(e) } }
async function fetchLikes(){ try{ const r=await fetch(`${API}/api/likes?user_id=${encodeURIComponent(currentUser)}`); likedPosts=new Set(await r.json()); }catch(e){} }
async function fetchEvents(){ try{ const r=await fetch(`${API}/api/events`); events=await r.json(); }catch(e){} }
async function fetchVotes(){ try{ const r=await fetch(`${API}/api/votes`); voteSessions=await r.json(); }catch(e){} }
let eventsLoaded=false, votesLoaded=false;
async function fetchRoles(){
  try{
    const r=await fetch(`${API}/api/roles`);
    const arr=await r.json();
    userRoles={};
    arr.forEach(x=>{ userRoles[x.user_id]=x.role });
    // 관리자 계정은 항상 admin
    if(currentUser==='관리자') currentUserRole='admin';
    else currentUserRole=userRoles[currentUser]||'user';
    if(currentUserRole==='admin'){ $('adminBtn').style.display=''; $('praiseAdminRow').style.display=''; }
  }catch(e){
    if(currentUser==='관리자'){ currentUserRole='admin'; $('adminBtn').style.display=''; $('praiseAdminRow').style.display=''; }
  }
}

async function initApp(){
  // ① 피드에 필요한 것만 먼저 — 즉시 렌더링
  await Promise.all([fetchPosts(), fetchLikes()]);
  renderFeed();
  // ② 나머지는 백그라운드에서 조용히
  Promise.all([fetchRoles(), fetchProfiles(), fetchPostKeywords()]).then(()=>renderFeed());
  fetchAndUpdateMileage();
}

// ── 피드 렌더링 ──
function renderBlocksInCard(p){
  if(!p.blocks||!p.blocks.length) return '';
  const imgs=p.blocks.filter(b=>b.type==='image');
  const texts=p.blocks.filter(b=>b.type==='text'&&b.content.trim());
  let html='';
  if(imgs.length===1){
    const im=imgs[0];
    html+=`<div class="post-img-wrap" onclick="openLightbox('${im.url}')"><img src="${im.url}" loading="lazy" onerror="this.parentElement.style.display='none'"/></div>`;
    if(im.caption) html+=`<div class="block-caption">${escHtml(im.caption)}</div>`;
  } else if(imgs.length===2){
    html+=`<div class="post-img-grid two">${imgs.map(im=>`<img src="${im.url}" loading="lazy" onclick="openLightbox('${im.url}')" onerror="this.style.display='none'"/>`).join('')}</div>`;
  } else if(imgs.length>=3){
    html+=`<div class="post-img-grid three"><div class="img-main"><img src="${imgs[0].url}" loading="lazy" onclick="openLightbox('${imgs[0].url}')" onerror="this.style.display='none'"/></div>${imgs.slice(1,3).map(im=>`<img src="${im.url}" loading="lazy" onclick="openLightbox('${im.url}')" onerror="this.style.display='none'"/>`).join('')}${imgs.length>3?`<div class="post-img-count">+${imgs.length-3}</div>`:''}</div>`;
  }
  texts.forEach(b=>{ html+=`<div class="block-text">${escHtml(b.content)}</div>` });
  return html;
}

function renderFeed(){
  const feed=$('feed');
  const compose=`<div class="compose-box" id="composeBox">${avHtml(currentUser,36)}<span class="compose-placeholder">지금 무슨 생각을 하고 있나요?</span></div>`;
  let display=[...posts].sort((a,b)=>(b.created_at||0)-(a.created_at||0));
  if(filterUser) display=display.filter(p=>p.author===filterUser);
  if(!display.length){
    const msg=filterUser?filterUser+'님의 글이 없습니다.':'첫 번째 글을 작성해보세요!';
    feed.innerHTML=compose+`<div class="empty-state"><div class="ei">📝</div>${msg}</div>`;
    $('composeBox').onclick=openWriteModal; return;
  }
  const cards=display.map(p=>{
    const key=p.id||'';
    const liked=likedPosts.has(key);
    const isMine=p.author===currentUser;
    const canDelete=isMine||currentUserRole==='admin';
    const moreMenu=canDelete?`<div class="more-menu-wrap"><button class="more-btn" onclick="toggleMenu(event,'mm-${key}')">⋯</button><div class="more-menu" id="mm-${key}">${isMine?`<button onclick="editPost('${key}')">수정</button>`:''}<button class="danger" onclick="deletePost('${key}')">삭제</button></div></div>`:'';
    const kw=postKeywords[key]?`<span class="post-keyword-tag">${escHtml(postKeywords[key])}</span>`:'';
    const cc=p.comment_count||0;
    const url=userProfiles[p.author]?.avatarUrl;
    const avImg=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.style.display='none'"/>`:'';
    return `<div class="post-card">
      <div class="post-header">
        <div class="avatar clickable" style="width:36px;height:36px;font-size:13px" onclick="onAuthorClick('${escHtml(p.author)}')">${avImg}${initials(p.author)}</div>
        <div class="post-header-info"><div class="post-author" onclick="onAuthorClick('${escHtml(p.author)}')">${escHtml(p.author||'알 수 없음')}</div><div class="post-date">${relDate(p.created_at)}</div></div>
        ${moreMenu}
      </div>
      ${kw}
      ${renderBlocksInCard(p)}
      <div class="post-actions">
        <button class="act-btn${liked?' liked':''}" onclick="toggleLike('${key}')">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          <span id="lc-${key}">${p.like_count||0}</span>
        </button>
        <button class="act-btn" onclick="openComments('${key}')">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span id="cc-${key}">${cc}</span>
        </button>
      </div>
    </div>`;
  }).join('');
  feed.innerHTML=compose+cards;
  $('composeBox').onclick=openWriteModal;
  const fb=$('userFilterBar');
  if(filterUser){ fb.style.display='flex'; $('userFilterName').textContent=filterUser+'님의 글'; }
  else { fb.style.display='none'; }
}

// ── 유저 클릭 ──
function onAuthorClick(author){
  if(author===currentUser){ openProfileModal(currentUser); return; }
  filterUser=author; switchTab('feed'); renderFeed();
}
function clearUserFilter(){ filterUser=null; renderFeed(); }

// ── 더보기 메뉴 ──
function toggleMenu(e,id){
  e.stopPropagation();
  document.querySelectorAll('.more-menu.open').forEach(m=>{ if(m.id!==id) m.classList.remove('open') });
  $(id).classList.toggle('open');
}
document.addEventListener('click',()=>document.querySelectorAll('.more-menu.open').forEach(m=>m.classList.remove('open')));

// ── 좋아요 ──
async function toggleLike(postId){
  const wasLiked=likedPosts.has(postId);
  const p=posts.find(x=>x.id===postId); if(!p) return;
  if(wasLiked){ likedPosts.delete(postId); p.like_count=Math.max(0,(p.like_count||0)-1); }
  else { likedPosts.add(postId); p.like_count=(p.like_count||0)+1; }
  const btn=document.querySelector(`[onclick="toggleLike('${postId}')"]`);
  if(btn) btn.className='act-btn'+(likedPosts.has(postId)?' liked':'');
  const lc=$(`lc-${postId}`); if(lc) lc.textContent=p.like_count;
  try{
    await fetch(`${API}/api/posts/${postId}/like`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser})});
    // 좋아요 시 서버에서 상대방 마일리지 처리됨
    if(!wasLiked) fetchAndUpdateMileage(); // 내 마일리지 갱신은 불필요하나 UI 유지용
  }catch(e){}
}

// ── 댓글 ──
async function openComments(postId){
  commentingPostId=postId;
  currentCommentLikeMap={}; currentCommentReplyMap={};
  $('commentsList').innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">불러오는 중...</div>';
  $('commentInput').value=''; $('submitComment').disabled=true;
  const cmtAv=$('cmtAvatar');
  const url=userProfiles[currentUser]?.avatarUrl;
  cmtAv.style.cssText='width:28px;height:28px;font-size:11px;flex-shrink:0;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;color:var(--green-dark);font-weight:700;overflow:hidden;position:relative';
  cmtAv.innerHTML=(url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.style.display='none'"/>`:'')+initials(currentUser);
  $('commentsModal').classList.add('open');
  await loadComments(postId);
}

async function loadComments(postId){
  try{
    const [cmts,replies,clikes]=await Promise.all([
      fetch(`${API}/api/posts/${postId}/comments`).then(r=>r.json()),
      fetch(`${API}/api/posts/${postId}/replies`).then(r=>r.json()),
      fetch(`${API}/api/posts/${postId}/comment-likes?user_id=${encodeURIComponent(currentUser)}`).then(r=>r.json()),
    ]);
    const post=posts.find(x=>x.id===postId); if(post) post.comment_count=cmts.length;
    const cc=$(`cc-${postId}`); if(cc) cc.textContent=cmts.length||0;
    // 답글 맵 구성
    currentCommentReplyMap={};
    replies.forEach(r=>{ if(!currentCommentReplyMap[r.comment_id]) currentCommentReplyMap[r.comment_id]=[]; currentCommentReplyMap[r.comment_id].push(r); });
    // 좋아요 맵 구성
    currentCommentLikeMap={};
    clikes.forEach(l=>{ currentCommentLikeMap[l.comment_id]={count:l.count,liked:l.liked}; });
    renderComments(cmts);
  }catch(e){ $('commentsList').innerHTML='<div style="padding:16px;color:var(--danger);font-size:13px">댓글을 불러오지 못했습니다.</div>' }
}

function renderComments(cmts){
  if(!cmts.length){ $('commentsList').innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">첫 댓글을 남겨보세요!</div>'; return; }
  const sorted=[...cmts].sort((a,b)=>{
    const aL=(currentCommentLikeMap[a.id]?.count||0);
    const bL=(currentCommentLikeMap[b.id]?.count||0);
    return bL!==aL?bL-aL:(a.created_at||0)-(b.created_at||0);
  });
  const topId=sorted[0].id, topHasLikes=(currentCommentLikeMap[topId]?.count||0)>0;
  $('commentsList').innerHTML=sorted.map((c,i)=>renderCommentItem(c,i===0&&topHasLikes)).join('');
}

function renderCommentItem(c,pinned){
  const canDel=c.author===currentUser||currentUserRole==='admin';
  const likeInfo=currentCommentLikeMap[c.id]||{count:0,liked:false};
  const replies=currentCommentReplyMap[c.id]||[];
  const url=userProfiles[c.author]?.avatarUrl;
  const avImg=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.style.display='none'"/>` :'';
  return `<div class="comment-item" id="ci-${c.id}">
    <div class="avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0;overflow:hidden;position:relative">${avImg}${initials(c.author)}</div>
    <div class="comment-body">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="comment-author">${escHtml(c.author)}</span>
        ${pinned?'<span class="comment-pin-badge">👍 인기 댓글</span>':''}
      </div>
      <div class="comment-text">${escHtml(c.content)}</div>
      <div class="comment-meta">
        <span>${relDate(c.created_at)}</span>
        <button class="comment-like-btn${likeInfo.liked?' liked':''}" onclick="toggleCommentLike('${c.id}','${escHtml(c.author)}')">♥ <span id="clc-${c.id}">${likeInfo.count||''}</span></button>
        <button class="comment-reply-btn" onclick="toggleReplyInput('${c.id}')">답글</button>
        ${canDel?`<button class="comment-del" onclick="deleteComment('${c.id}')">삭제</button>`:''}
      </div>
      ${replies.length?`<div class="reply-list" id="rl-${c.id}">${replies.map(r=>renderReply(r,c.id)).join('')}</div>`:`<div class="reply-list" id="rl-${c.id}" style="display:none"></div>`}
      <div id="ri-wrap-${c.id}" style="display:none">
        <div class="reply-input-row">
          <input type="text" id="ri-${c.id}" placeholder="${escHtml(c.author)}에게 답글..."/>
          <button onclick="submitReply('${c.id}')">게시</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderReply(r,parentId){
  const canDel=r.author===currentUser||currentUserRole==='admin';
  const url=userProfiles[r.author]?.avatarUrl;
  const avImg=url?`<img src="${url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%" onerror="this.style.display='none'"/>`:'';
  return `<div class="reply-item">
    <div class="avatar" style="width:26px;height:26px;font-size:10px;flex-shrink:0;overflow:hidden;position:relative">${avImg}${initials(r.author)}</div>
    <div style="flex:1">
      <div class="comment-author" style="font-size:12px">${escHtml(r.author)}</div>
      <div class="comment-text" style="font-size:12px">${escHtml(r.content)}</div>
      <div class="comment-meta"><span>${relDate(r.created_at)}</span>${canDel?`<button class="comment-del" onclick="deleteReply('${parentId}','${r.id}')">삭제</button>`:''}</div>
    </div>
  </div>`;
}

function toggleReplyInput(cid){
  const el=$(`ri-wrap-${cid}`); if(!el) return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(!open) $(`ri-${cid}`)?.focus();
}
async function submitReply(cid){
  const inp=$(`ri-${cid}`); if(!inp) return;
  const txt=inp.value.trim(); if(!txt) return;
  try{
    const r=await fetch(`${API}/api/comments/${cid}/replies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:currentUser,content:txt})});
    const reply=await r.json();
    if(!currentCommentReplyMap[cid]) currentCommentReplyMap[cid]=[];
    currentCommentReplyMap[cid].push(reply);
    inp.value='';
    const rl=$(`rl-${cid}`);
    if(rl){ rl.style.display='block'; rl.innerHTML=currentCommentReplyMap[cid].map(x=>renderReply(x,cid)).join(''); }
    $(`ri-wrap-${cid}`).style.display='none';
    fetchAndUpdateMileage();
  }catch(e){ alert('답글 등록 실패') }
}
async function deleteReply(cid,rid){
  if(!confirm('답글을 삭제할까요?')) return;
  await fetch(`${API}/api/replies/${rid}`,{method:'DELETE'});
  currentCommentReplyMap[cid]=(currentCommentReplyMap[cid]||[]).filter(r=>r.id!==rid);
  const rl=$(`rl-${cid}`);
  if(rl){ rl.innerHTML=currentCommentReplyMap[cid].map(x=>renderReply(x,cid)).join(''); if(!currentCommentReplyMap[cid].length) rl.style.display='none'; }
}

async function toggleCommentLike(cid,author){
  try{
    const r=await fetch(`${API}/api/comments/${cid}/like`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser,comment_author:author})});
    const d=await r.json();
    currentCommentLikeMap[cid]={count:d.count,liked:d.liked};
    const btn=document.querySelector(`[onclick="toggleCommentLike('${cid}','${author}')"]`);
    if(btn) btn.className='comment-like-btn'+(d.liked?' liked':'');
    const el=$(`clc-${cid}`); if(el) el.textContent=d.count||'';
  }catch(e){}
}

$('commentInput').oninput=function(){ $('submitComment').disabled=!this.value.trim() };
$('submitComment').onclick=async function(){
  const txt=$('commentInput').value.trim();
  if(!txt||!commentingPostId) return;
  $('submitComment').disabled=true;
  try{
    await fetch(`${API}/api/posts/${commentingPostId}/comments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:currentUser,content:txt})});
    $('commentInput').value='';
    await loadComments(commentingPostId);
    fetchAndUpdateMileage();
  }catch(e){ alert('댓글 등록 실패') }
};
$('commentInput').onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!$('submitComment').disabled) $('submitComment').click() }};
async function deleteComment(id){
  if(!confirm('댓글을 삭제할까요?')) return;
  await fetch(`${API}/api/comments/${id}`,{method:'DELETE'});
  await loadComments(commentingPostId);
}

// ── 라이트박스 ──
function openLightbox(url){ $('lightboxImg').src=url; $('lightbox').classList.add('open'); document.body.style.overflow='hidden' }
function closeLightbox(){ $('lightbox').classList.remove('open'); document.body.style.overflow='' }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox() });

// ── 블록 에디터 ──
function renderEditor(){
  const editor=$('blockEditor'); editor.innerHTML='';
  editorBlocks.forEach((b,i)=>{
    const div=document.createElement('div');
    div.className='editor-block '+(b.type==='text'?'text-block':'img-block');
    if(b.type==='text'){
      div.innerHTML=`<textarea placeholder="${i===0?'지금 무슨 생각을 하고 있나요?':'내용을 이어서 써보세요.'}" rows="3">${b.content}</textarea>`;
      const ta=div.querySelector('textarea');
      ta.oninput=()=>{ editorBlocks[i].content=ta.value; ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px' };
      ta.style.height='auto'; ta.style.height=(ta.scrollHeight||80)+'px';
    } else {
      div.innerHTML=`<img src="${b.url}" loading="lazy"/><div class="caption-wrap"><input class="caption-input" type="text" placeholder="사진 설명 (선택)" value="${b.caption||''}"/><button class="block-del">×</button></div>`;

    }
    editor.appendChild(div);
  });
}

      if(selectedKeyword) postKeywords[editingKey]=selectedKeyword; else delete postKeywords[editingKey];

};

function initNewsTab(){ if(!newsData[currentNewsCategory]) loadNews(currentNewsCategory); }
function switchNewsCategory(cat){
  currentNewsCategory=cat;
  $('newsCatLabor').className='news-cat-btn'+(cat==='labor'?' active':'');
  $('newsCatLocal').className='news-cat-btn'+(cat==='local'?' active':'');
  if(!newsData[cat]) loadNews(cat); else renderNewsItems(newsData[cat],false);
}
async function loadNews(cat,force){
  if(newsData[cat]&&!force){ renderNewsItems(newsData[cat]); return; }
  $('newsContainer').innerHTML='<div class="news-loading">뉴스를 불러오는 중...</div>';
  try{
    const resp=await fetch(`${API}/api/news?category=${cat}`);
    if(!resp.ok) throw new Error('fail');
    const items=await resp.json();
    if(items.error) throw new Error(items.error);
    newsData[cat]=items;
    renderNewsItems(items,true);
  }catch(e){
    $('newsContainer').innerHTML=`<div class="news-loading">뉴스를 불러오지 못했습니다.<br><button class="news-refresh-btn" style="margin-top:10px" onclick="loadNews('${cat}',true)">다시 시도</button></div>`;
  }
}
function renderNewsItems(items,reset){
  const cat=currentNewsCategory;
  if(!items||!items.length){ $('newsContainer').innerHTML='<div class="news-loading">뉴스 항목이 없습니다.</div>'; return; }
  if(reset) newsShownCount[cat]=10;
  const shown=Math.min(newsShownCount[cat]||10, items.length);
  const hasMore=shown<items.length;
  $('newsContainer').innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="news-refresh-btn" onclick="loadNews('${cat}',true)">새로고침</button></div>`
    +items.slice(0,shown).map((n,i)=>`<div class="news-card" id="nc-${i}">
      <div class="news-card-title"><a href="${escHtml(n.link)}" target="_blank" rel="noopener">${escHtml(n.title)}</a></div>
      <div class="news-card-meta">${n.source?`<span class="news-source">${escHtml(n.source)}</span>`:''}<span>${fmtNewsDate(n.pubDate)}</span></div>
      <button class="news-summary-btn" onclick="toggleSummary(this,${i})">AI 요약 보기</button>
      <div class="news-summary" id="ns-${i}"></div>
    </div>`).join('')
    +(hasMore?`<div id="newsMoreSentinel" style="text-align:center;padding:16px;color:var(--text-hint);font-size:13px">불러오는 중...</div>`:'');
  if(hasMore){
    const obs=new IntersectionObserver(entries=>{
      if(!entries[0].isIntersecting) return;
      obs.disconnect();
      newsShownCount[cat]=(newsShownCount[cat]||10)+10;
      renderNewsItems(newsData[cat]);
    },{rootMargin:'200px'});
    const sentinel=$('newsMoreSentinel');
    if(sentinel) obs.observe(sentinel);
  }
}
async function toggleSummary(btn,idx){
  const s=$(`ns-${idx}`);
  if(s.classList.contains('open')){ s.classList.remove('open'); btn.textContent='AI 요약 보기'; return; }
  const item=newsData[currentNewsCategory]?.[idx];
  if(!item) return;
  const {title,description,link}=item;
  btn.textContent='요약 중...'; btn.disabled=true;
  try{
    const r=await fetch(`${API}/api/summarize`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:description||'',link:link||''})});
    const d=await r.json();
    if(d.summary){ s.textContent=d.summary; s.classList.add('open'); btn.textContent='요약 닫기'; }
    else{ s.textContent=description||'요약을 가져오지 못했습니다.'; s.classList.add('open'); btn.textContent='닫기'; }
  }catch(e){ s.textContent='요약 실패'; s.classList.add('open'); btn.textContent='닫기'; }
  btn.disabled=false;
}
function fmtNewsDate(s){ if(!s) return ''; try{ return new Date(s).toLocaleDateString('ko-KR',{month:'long',day:'numeric'}) }catch(e){ return s } }

async function renderPraise(){
  await fetchVotes();
  if(!voteSessions.length){ $('praiseList').innerHTML='<div class="empty-state">진행 중인 서부 프로 투표가 없습니다.</div>'; return; }
  $('praiseList').innerHTML='';
  // activeUsers가 없으면 API에서 가져오기
  if(!activeUsers.length){ try{ const r=await fetch(`${API}/api/users`); const all=await r.json(); activeUsers=all.filter(u=>u.status==='active'); }catch(e){} }
  for(const s of voteSessions){
    const detail=await fetch(`${API}/api/votes/${s.id}?voter=${encodeURIComponent(currentUser)}`).then(r=>r.json()).catch(()=>s);
    const card=document.createElement('div'); card.className='vote-card';
    const isActive=s.active&&(!s.end_at||Math.floor(Date.now()/1000)<s.end_at);
    const myVote=detail.my_vote, results=detail.results||[];
    const total=results.reduce((acc,r)=>acc+(r.count||0),0);
    const nominees=activeUsers.filter(u=>u.id!==currentUser).map(u=>u.id);
    let html=`<div class="vote-card-header"><span class="vote-title">${escHtml(s.title)}</span><span class="vote-status ${isActive?'active':'closed'}">${isActive?'진행 중':'종료'}</span></div>`;
    if(s.description) html+=`<div class="vote-desc">${escHtml(s.description)}</div>`;
    if(s.end_at) html+=`<div class="vote-deadline">마감: ${fmtEndDate(s.end_at)}</div>`;
    if(results.length){
      html+=`<div class="vote-results">`+results.map(r=>{
        const pct=total?Math.round((r.count/total)*100):0;
        return `<div class="vote-result-row"><span class="vote-result-name">${escHtml(r.nominee)}</span><div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div><span class="vote-count">${r.count}</span></div>`;
      }).join('')+'</div>';
    }
    if(isActive&&!myVote){
      html+=`<div class="vote-options">`+nominees.map(n=>`<button class="vote-option-btn" onclick="selectNominee(this,'${escHtml(n)}')">${escHtml(n)}</button>`).join('')+'</div>';
      html+=`<button class="btn-vote" id="vote-btn-${s.id}" disabled onclick="submitVote('${s.id}')">투표하기</button>`;
    } else if(myVote){
      html+=`<div class="voted-msg">✓ ${escHtml(myVote)}에게 투표했습니다</div>`;
    }
    if(currentUserRole==='admin'){
      html+=`<div class="vote-admin-btns">`;
      if(isActive) html+=`<button class="btn-sm danger" onclick="closePraiseSession('${s.id}')">투표 종료</button>`;
      html+=`<button class="btn-sm danger" onclick="deletePraiseSession('${s.id}')">삭제</button></div>`;
    }
    card.innerHTML=html; $('praiseList').appendChild(card);
  }
}
function selectNominee(btn,name){
  selectedNominee=name;
  btn.closest('.vote-card').querySelectorAll('.vote-option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const vb=btn.closest('.vote-card').querySelector('[id^="vote-btn-"]');
  if(vb) vb.disabled=false;
}
async function submitVote(sid){
  if(!selectedNominee) return;
  try{
    const r=await fetch(`${API}/api/votes/${sid}/vote`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voter:currentUser,nominee:selectedNominee})});
    const d=await r.json();
    if(d.error){ alert(d.error); return; }
    selectedNominee=null; renderPraise();
  }catch(e){ alert('투표 실패: '+e.message) }
}
async function closePraiseSession(id){ if(!confirm('투표를 종료할까요?')) return; await fetch(`${API}/api/votes/${id}/close`,{method:'POST'}); renderPraise(); }
async function deletePraiseSession(id){ if(!confirm('삭제할까요?')) return; await fetch(`${API}/api/votes/${id}`,{method:'DELETE'}); renderPraise(); }
