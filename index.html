  $('adminModal').classList.add('open');
  try{
    const [users,stats,online,aiUsage]=await Promise.all([
      fetch(`${API}/api/users`).then(r=>r.json()),
      fetch(`${API}/api/admin/stats`).then(r=>r.json()),
      fetch(`${API}/api/presence`).then(r=>r.json()),
      fetch(`${API}/api/admin/token-usage`).then(r=>r.json()),
    ]);
    const postMap={},cmtMap={},mileMap={};
    stats.posts.forEach(p=>{ postMap[p.author]=p.cnt });
    stats.comments.forEach(c=>{ cmtMap[c.author]=c.cnt });
    stats.mileage.forEach(m=>{ mileMap[m.user_id]=m.points });
    const pending=users.filter(u=>u.status==='pending');
    const active=users.filter(u=>u.status==='active');

    // 사용자 관리 탭
    let html='';
    if(pending.length){
      html+=`<div style="font-size:12px;font-weight:600;color:var(--danger);margin-bottom:6px">승인 대기 ${pending.length}명</div>`;
      html+=pending.map(u=>`<div class="user-role-row">
        <div class="user-role-top">
          <span class="user-role-name">${escHtml(u.id)}</span>
          <div class="role-btns">
            <button class="role-btn primary on" onclick="approveUser('${u.id}')">승인</button>
            <button class="role-btn" style="color:var(--danger)" onclick="deleteUser('${u.id}')">삭제</button>
          </div>
        </div>
      </div>`).join('');
      html+=`<div style="height:1px;background:var(--border);margin:10px 0 12px"></div>`;
    }
    html+=active.map(u=>{
      const role=userRoles[u.id]||'user', isAdmin=role==='admin';
      const p2=postMap[u.id]||0, c2=cmtMap[u.id]||0, pts=mileMap[u.id]||0;
      return `<div class="user-role-row">
        <div class="user-role-top">
          <div style="display:flex;align-items:center;gap:8px">
            ${avHtml(u.id,32)}
            <span class="user-role-name">${escHtml(u.id)}</span>
          </div>
          <div class="role-btns">
            ${u.id==='관리자'?`<span style="font-size:12px;color:var(--green-dark);font-weight:600">슈퍼관리자</span>`:`
              <button class="role-btn${!isAdmin?' on':''}" onclick="setUserRole('${u.id}','user',this)">일반</button>
              <button class="role-btn${isAdmin?' on':''}" onclick="setUserRole('${u.id}','admin',this)">관리자</button>
              <button class="role-btn" style="color:var(--danger)" onclick="deleteUser('${u.id}')">삭제</button>`}
          </div>
        </div>
        <div class="user-stats"><span>글 ${p2}개</span><span>댓글 ${c2}개</span><span>${pts}P</span></div>
      </div>`;
    }).join('');
    $('userRoleList').innerHTML=html||'<div style="padding:20px;text-align:center;color:#aaa">사용자가 없습니다.</div>';

    // 마일리지 현황 탭
    const ranked=stats.mileage.sort((a,b)=>b.points-a.points);
    $('mileageRankList').innerHTML=ranked.length
      ? ranked.map((m,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:16px;font-weight:800;min-width:28px;color:${i===0?'#f7b731':i===1?'#9e9e9e':i===2?'#cd7f32':'var(--text-hint)'}">${i+1}</span>
          <span style="flex:1;font-size:14px;font-weight:600">${escHtml(m.user_id)}</span>
          <span style="font-size:15px;font-weight:700;color:var(--green-dark)">${m.points}P</span>
        </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:#aaa">데이터가 없습니다.</div>';

    // 접속자 탭
    $('onlineUserList').innerHTML=`<div style="font-size:12px;color:var(--text-hint);margin-bottom:12px">최근 3분 이내 접속한 사용자</div>`
      +(online.length
        ? online.map(u=>{
            const ago=Math.floor(Date.now()/1000)-u.last_seen;
            const agoStr=ago<60?`${ago}초 전`:ago<3600?`${Math.floor(ago/60)}분 전`:`${Math.floor(ago/3600)}시간 전`;
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="width:7px;height:7px;background:#37c272;border-radius:50%;flex-shrink:0"></span>
              <span style="flex:1;font-size:14px">${escHtml(u.user_id)}</span>
              <span style="font-size:12px;color:var(--text-hint)">${agoStr}</span>
            </div>`;
          }).join('')
        : '<div style="padding:20px;text-align:center;color:#aaa">현재 접속자가 없습니다.</div>');

    // AI 사용량 탭
    const cost=((aiUsage.total?.tin||0)*0.00000025+(aiUsage.total?.tout||0)*0.00000125).toFixed(4);
    $('aiUsagePanel').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div style="background:var(--green-light);border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:20px;font-weight:800;color:var(--green-dark)">${aiUsage.total?.calls||0}</div>
          <div style="font-size:11px;color:var(--text-sub)">요약 횟수</div>
        </div>
        <div style="background:#fff3e0;border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:15px;font-weight:800;color:#e65100">${((aiUsage.total?.tin||0)+(aiUsage.total?.tout||0)).toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-sub)">총 토큰</div>
        </div>
        <div style="background:#f3e5f5;border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:16px;font-weight:800;color:#6a1b9a">$${cost}</div>
          <div style="font-size:11px;color:var(--text-sub)">예상 비용</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-hint);margin-bottom:8px">최근 요약 내역</div>
      ${(aiUsage.recent||[]).map(r=>{
        const d=new Date(r.created_at*1000);
        return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
          <span style="color:var(--text-sub)">${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</span>
          <span>in: ${r.tokens_in} / out: ${r.tokens_out}</span>
        </div>`;
      }).join('')||'<div style="padding:16px;text-align:center;color:#aaa">기록 없음</div>'}
    `;
  }catch(e){
    $('userRoleList').innerHTML='<div style="padding:16px;color:var(--danger);font-size:13px">데이터를 불러오지 못했습니다.</div>';
  }
}

async function setUserRole(userId,role,btn){
  await fetch(`${API}/api/roles/${encodeURIComponent(userId)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({role})});
  userRoles[userId]=role;
  btn.closest('.role-btns').querySelectorAll('.role-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function approveUser(userId){
  await fetch(`${API}/api/users/${encodeURIComponent(userId)}/approve`,{method:'PUT'});
  activeUsers=[]; // 캐시 무효화
  openAdminModal();
}

async function deleteUser(userId){
  if(!confirm(`'${userId}'를 삭제할까요?`)) return;
  await fetch(`${API}/api/users/${encodeURIComponent(userId)}`,{method:'DELETE'});
  activeUsers=[];
  openAdminModal();
}

// ── 화면 전환 ──
function show(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); $(id).classList.add('active') }

// ── 로그인 탭 전환 ──
function switchLoginTab(t){
  $('loginForm').style.display=t==='login'?'':'none';
  $('registerForm').style.display=t==='register'?'':'none';
  $('ltab-login').className='login-tab-btn'+(t==='login'?' active':'');
  $('ltab-register').className='login-tab-btn'+(t==='register'?' active':'');
}

// ── 로그인 ──
function startApp(id){
  currentUser=id; chatLastTs=0; chatUnread=0;
  localStorage.setItem('saved_id',id);
  show('appPage'); $('fab').className='fab show';
  renderFeed(); initApp(); startPresence();
  // 채팅 백그라운드 폴링 (미읽 배지용) - 30초마다
  setInterval(()=>{ if(!$('chatModal').classList.contains('open')&&currentUser) loadChatMessages(); },30000);
}

async function doLogin(e){
  if(e) e.preventDefault();
  const id=$('uid').value.trim(), pw=$('upw').value.trim();
  if(!id||!pw){ $('lerr').textContent='아이디와 비밀번호를 입력해주세요.'; return; }
  $('loginBtn').disabled=true; $('lerr').textContent='';
  try{
    const r=await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});
    const d=await r.json();
    if(d.ok){ localStorage.setItem('saved_pw',pw); startApp(id); }
    else { $('lerr').textContent=d.error||'로그인 실패'; }
  }catch(e){ $('lerr').textContent='서버 연결 실패'; }
  finally{ $('loginBtn').disabled=false; }
}

// ── 회원가입 ──
async function doRegister(e){
  if(e) e.preventDefault();
  const id=$('reg-id').value.trim(), pw=$('reg-pw').value.trim();
  if(!id||!pw){ $('rerr').textContent='모든 항목을 입력해주세요.'; return; }
  if(id.length<2){ $('rerr').textContent='아이디는 2자 이상이어야 합니다.'; return; }
  $('registerBtn').disabled=true; $('rerr').textContent='';
  try{
    const r=await fetch(`${API}/api/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:pw})});
    const d=await r.json();
    if(d.ok){ alert('가입 신청이 완료되었습니다.\n관리자 승인 후 로그인 가능합니다.'); switchLoginTab('login'); $('uid').value=id; }
    else { $('rerr').textContent=d.error||'가입 실패'; }
  }catch(e){ $('rerr').textContent='서버 연결 실패'; }
  finally{ $('registerBtn').disabled=false; }
}

$('loginForm').onsubmit=doLogin;
$('loginBtn').onclick=doLogin;
$('registerForm').onsubmit=doRegister;
$('registerBtn').onclick=doRegister;

// ── 자동 로그인 ──
(function(){
  const savedId=localStorage.getItem('saved_id'), savedPw=localStorage.getItem('saved_pw');
  if(!savedId||!savedPw){ if(savedId) $('uid').value=savedId; return; }
  $('uid').value=savedId;
  // 낙관적 자동 로그인 후 백그라운드 검증
  startApp(savedId);
  fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:savedId,password:savedPw})})
    .then(r=>r.json()).then(d=>{ if(!d.ok){ localStorage.removeItem('saved_id'); localStorage.removeItem('saved_pw'); show('loginPage'); } })
    .catch(()=>{});
})()

// ── 당겨서 새로고침 ──
(function(){
  let startY=0,curY=0,isPulling=false,isRefreshing=false;
  const THRESH=70;
  const HIDE=-56; // 숨김 위치 (safe-area는 CSS가 처리)
  function isFeedActive(){ return $('tabFeed')?.classList.contains('active') }
  document.addEventListener('touchstart',e=>{
    if(!isFeedActive()||isRefreshing) return;
    if(window.scrollY>2) return;
    startY=e.touches[0].clientY; curY=startY; isPulling=false;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!isFeedActive()||isRefreshing) return;
    curY=e.touches[0].clientY;
    const dy=curY-startY;
    if(dy<8||window.scrollY>2){ isPulling=false; return; }
    isPulling=true;
    e.preventDefault();
    const pull=Math.min(dy,150);
    const shown=Math.min(pull*0.45,48)-52;
    const ratio=Math.min(pull/THRESH,1);
    const ind=$('pullIndicator');
    ind.style.transition='none';
    ind.style.transform=`translateY(${shown}px)`;
    $('pullIcon').style.transform=`rotate(${ratio*180}deg)`;
    $('pullText').textContent=pull>=THRESH?'놓으면 새로고침 ✓':'당겨서 새로고침';
  },{passive:false});
  document.addEventListener('touchend',async e=>{
    if(!isFeedActive()||!isPulling) return;
    isPulling=false;
    const dy=curY-startY;
    const ind=$('pullIndicator');
    if(dy<THRESH){
      ind.style.transition='transform .3s';
      ind.style.transform='translateY(-52px)';
      return;
    }
    isRefreshing=true;
    ind.style.transition='transform .25s';
    ind.style.transform='translateY(0)';
    $('pullIcon').classList.add('spinning');
    $('pullIcon').style.transform='';
    $('pullText').textContent='새로고침 중...';
    try{
      await Promise.all([fetchPosts(),fetchLikes()]);
      renderFeed();
      fetchAndUpdateMileage();
      Promise.all([fetchProfiles(),fetchPostKeywords()]).then(()=>renderFeed());
    }catch(err){}
    await new Promise(r=>setTimeout(r,500));
    $('pullIcon').classList.remove('spinning');
    $('pullText').textContent='완료 ✓';
    await new Promise(r=>setTimeout(r,500));
    ind.style.transition='transform .3s';
    ind.style.transform='translateY(-52px)';
    setTimeout(()=>{ isRefreshing=false; },350);
  },{passive:true});
})();

// ── 채팅 ──
function openChat(){
  $('chatModal').classList.add('open');
  chatUnread=0; $('chatBadge').style.display='none';
  loadChatMessages();
  chatPollTimer=setInterval(loadChatMessages,3000);
  setTimeout(()=>$('chatInput').focus(),300);
}
function closeChat(){
  $('chatModal').classList.remove('open');
  clearInterval(chatPollTimer); chatPollTimer=null;
}
async function loadChatMessages(){
  try{
    const r=await fetch(`${API}/api/chat?since=0`);
    const msgs=await r.json();
    if(!Array.isArray(msgs)) return;
    const box=$('chatMessages');
    const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<60;
    const newMsgs=msgs.filter(m=>m.created_at>chatLastTs);
    if(newMsgs.length===0) return;
    chatLastTs=msgs.reduce((mx,m)=>Math.max(mx,m.created_at),chatLastTs);
    // Show unread badge if chat is closed
    if(!$('chatModal').classList.contains('open')){ chatUnread+=newMsgs.length; $('chatBadge').style.display=''; return; }
    box.innerHTML=msgs.map(m=>{
      const mine=m.author===currentUser;
      const t=new Date(m.created_at*1000);
      const ts=`${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
      const del=currentUserRole==='admin'&&!mine?`<button onclick="deleteChatMsg('${m.id}')" style="background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 4px;line-height:1">×</button>`:'';
      return `<div class="chat-msg${mine?' mine':''}">
        <div>
          ${mine?'':`<div class="chat-meta">${escHtml(m.author)}</div>`}
          <div class="chat-bubble">${escHtml(m.content)}</div>
        </div>
        <span class="chat-meta">${ts}${del}</span>
      </div>`;
    }).join('');
    if(atBottom||newMsgs.some(m=>m.author===currentUser)) box.scrollTop=box.scrollHeight;
  }catch(e){}
}
async function sendChat(){
  const inp=$('chatInput'), txt=inp.value.trim();
  if(!txt||!currentUser) return;
  inp.value='';
  try{
    await fetch(`${API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({author:currentUser,content:txt})});
    await loadChatMessages();
  }catch(e){ inp.value=txt; alert('전송 실패'); }
}
async function deleteChatMsg(id){
  await fetch(`${API}/api/chat/${id}`,{method:'DELETE'});
  await loadChatMessages();
}
// 채팅 엔터키
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.activeElement===$('chatInput')){ e.preventDefault(); sendChat(); }});
// 프레즌스 하트비트 (60초마다)
function startPresence(){
  function ping(){ if(currentUser) fetch(`${API}/api/presence`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser})}).catch(()=>{}); }
  ping(); setInterval(ping,60000);
}

function doLogout(){
  try{
    currentUser=''; posts=[]; events=[]; voteSessions=[]; likedPosts=new Set();
    userRoles={}; currentUserRole='user'; filterUser=null;
    newsData={labor:null,local:null}; newsShownCount={labor:10,local:10}; postKeywords={}; userProfiles={}; activeUsers=[];
    eventsLoaded=false; votesLoaded=false;
    localStorage.removeItem('saved_id'); localStorage.removeItem('saved_pw');
    $('uid').value=''; $('upw').value=''; $('lerr').textContent='';
    $('adminBtn').style.display='none'; $('praiseAdminRow').style.display='none';
    $('fab').className='fab';
    $('mileageNum').textContent='0';
  }catch(e){}
  show('loginPage');
}
</script>
