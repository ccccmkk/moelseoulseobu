name = "band-archive-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "band-archive-db"
database_id = "35d0a1ba-1023-4b63-a491-570d7463576f"

[[r2_buckets]]
binding = "R2"
bucket_name = "band-archive"

[vars]
# law.go.kr OPEN API OC 코드 (등록 이메일 아이디 @ 앞부분)
LAW_OC = "이메일ID입력"

[triggers]
# "*/10 * * * *" → 10분마다 댓글 자동 답변
# "0 1 * * *"    → 매일 10:00 KST 건강 정보 글 게시
# "0 7 * * *"    → 매일 16:00 KST 건강 정보 글 게시
crons = ["*/10 * * * *", "0 1 * * *", "0 7 * * *"]
